services:
  postgres:
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: mini_drop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev
    volumes:
      - mini_drop_postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d mini_drop
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command:
      - server
      - /data
      - --console-address
      - :9001
    environment:
      MINIO_ROOT_USER: minidrop
      MINIO_ROOT_PASSWORD: minidrop123
    ports:
      - "${MINIDROP_MINIO_PORT:-9000}:9000"
      - "${MINIDROP_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - mini_drop_minio:/data
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://127.0.0.1:9000/minio/health/ready
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  api-server:
    build:
      context: ..
      dockerfile: apps/api-server/Dockerfile
    environment:
      MINIDROP_ALLOWED_ORIGIN: http://localhost,http://127.0.0.1,http://localhost:${MINIDROP_WEB_PORT:-80},http://127.0.0.1:${MINIDROP_WEB_PORT:-80}
      MINIDROP_API_ADDR: 0.0.0.0:8080
      MINIDROP_DB_DRIVER: postgres
      MINIDROP_POSTGRES_DSN: host=postgres user=postgres password=dev dbname=mini_drop sslmode=disable
      MINIDROP_ARTIFACT_DIR: /app/artifacts
      MINIDROP_STORAGE_BACKEND: minio
      MINIDROP_MINIO_ENDPOINT: minio:9000
      MINIDROP_MINIO_PUBLIC_ENDPOINT: http://localhost:${MINIDROP_MINIO_PORT:-9000}
      MINIDROP_MINIO_ACCESS_KEY: minidrop
      MINIDROP_MINIO_SECRET_KEY: minidrop123
      MINIDROP_MINIO_BUCKET: mini-drop-artifacts
      MINIDROP_MINIO_REGION: us-east-1
      MINIDROP_MINIO_USE_SSL: "false"
      MINIDROP_MINIO_PRESIGN_TTL_SEC: 900
      MINIDROP_AGENT_ALLOWLIST: drop_agent
      MINIDROP_AI_ENABLED: ${MINIDROP_AI_ENABLED:-}
      MINIDROP_AI_BASE_URL: ${MINIDROP_AI_BASE_URL:-https://api.openai.com/v1}
      MINIDROP_AI_API_KEY: ${MINIDROP_AI_API_KEY:-}
      MINIDROP_AI_MODEL: ${MINIDROP_AI_MODEL:-gpt-4o-mini}
      MINIDROP_AI_TIMEOUT_SEC: ${MINIDROP_AI_TIMEOUT_SEC:-20}
      MINIDROP_OFFLINE_AFTER_SEC: ${MINIDROP_OFFLINE_AFTER_SEC:-30}
      MINIDROP_OFFLINE_SCAN_SEC: ${MINIDROP_OFFLINE_SCAN_SEC:-10}
    ports:
      - "${MINIDROP_API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - mini_drop_artifacts:/app/artifacts
    healthcheck:
      test:
        - CMD
        - wget
        - -q
        - -O
        - /dev/null
        - http://127.0.0.1:8080/healthz
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  agent:
    build:
      context: ..
      dockerfile: apps/agent/Dockerfile
    depends_on:
      api-server:
        condition: service_healthy
    environment:
      MINIDROP_API_BASE_URL: http://api-server:8080
      MINIDROP_AGENT_ID: drop_agent
      MINIDROP_AGENT_HOSTNAME: drop-agent
      MINIDROP_AGENT_IP: ${MINIDROP_AGENT_IP:-127.0.0.1}
      MINIDROP_AGENT_VERSION: 0.1.0
      MINIDROP_PYTHON_BIN: python
      MINIDROP_ANALYZER_SCRIPT: /app/analyzer/main.py
      MINIDROP_ARTIFACT_DIR: /app/artifacts
    pid: host
    privileged: true
    volumes:
      - mini_drop_artifacts:/app/artifacts
    healthcheck:
      test:
        - CMD
        - /bin/sh
        - -c
        - for f in /proc/[0-9]*/cmdline; do tr '\0' ' ' < "$$f" | grep -q /app/mini-drop-agent && exit 0; done; exit 1
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:${MINIDROP_API_PORT:-8080}
    depends_on:
      api-server:
        condition: service_healthy
    ports:
      - "${MINIDROP_WEB_PORT:-80}:80"
    healthcheck:
      test:
        - CMD
        - wget
        - -q
        - -O
        - /dev/null
        - http://127.0.0.1/
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  mini_drop_postgres:
  mini_drop_minio:
  mini_drop_artifacts:
